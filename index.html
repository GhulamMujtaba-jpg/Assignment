<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Store Ultimate Pro</title>
<style>
/* ===== Body & Background ===== */
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:linear-gradient(135deg,#36d1dc,#5b86e5,#ff9966,#ff5e62);
  background-size:400% 400%;
  animation:bg 15s infinite alternate;
  transition: all .3s;
}
@keyframes bg{
  0%{background-position:left}
  100%{background-position:right}
}
/* ===== Header ===== */
header{
  background:#2c3e50;
  color:white;
  padding:15px;
  text-align:center;
  box-shadow:0 2px 10px rgba(0,0,0,.3);
}
header h1{margin:0;font-size:1.8em;}
/* ===== Container ===== */
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}
/* ===== Inputs & Buttons ===== */
input, button, select{
  padding:8px;
  margin:5px;
  border-radius:6px;
  border:none;
  transition:.3s;
}
input:focus, select:focus{outline:2px solid #27ae60;}
button{
  background:#27ae60;
  color:white;
  cursor:pointer;
}
button.delete{background:red;}
button.edit{background:#f39c12;}
button:hover{opacity:.9; transform:scale(1.02);}
#loginPanel{max-width:400px; margin:auto; background:white; padding:20px; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,.3);}
#loginPanel input{width:100%; margin-bottom:10px;}

/* ===== Product Cards ===== */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
  margin-top:20px;
}
.card{
  background:white;
  border-radius:10px;
  padding:10px;
  box-shadow:0 3px 10px rgba(0,0,0,.3);
  position:relative;
  overflow:hidden;
  transition:.3s;
}
.card:hover{transform:scale(1.02);}
.card img.main-img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:6px;
}
.thumb-slider{
  display:flex;
  justify-content:center;
  gap:5px;
  margin-top:5px;
}
.thumb-slider img{
  width:50px;
  height:50px;
  border-radius:4px;
  cursor:pointer;
  border:2px solid transparent;
  transition:.3s;
}
.thumb-slider img.active{border-color:#27ae60;}
.price{font-size:18px;color:#27ae60;font-weight:bold;}
.old{text-decoration:line-through;color:red;}
.filter-bar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:10px;
}
/* ===== Responsive ===== */
@media(max-width:768px){
  .products{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));}
  input,select,button{width:100%;}
}
</style>
</head>
<body>

<header><h1>GM Store Ultimate Pro</h1></header>

<div class="container">
  <!-- Admin Login Panel -->
  <div id="loginPanel">
    <h2>Admin Login</h2>
    <input type="text" id="adminUser" placeholder="Username">
    <input type="password" id="adminPass" placeholder="Password">
    <button onclick="adminLogin()">Login</button>
  </div>

  <!-- Admin Dashboard -->
  <div id="adminDashboard" style="display:none;">
    <h2>Add / Edit Product</h2>
    <input id="pname" placeholder="Product Name">
    <input type="number" id="price" placeholder="Price PKR">
    <input type="number" id="discount" placeholder="Discount %">
    <input type="number" id="stock" placeholder="Stock">
    <input id="whatsapp" placeholder="WhatsApp Number">
    <input id="category" placeholder="Category">
    <input type="file" id="images" multiple accept="image/*">
    <button onclick="addProduct()">Add Product</button>
    <button id="updateBtn" style="display:none" onclick="updateProduct()">Update Product</button>

    <h2>Filters & Search</h2>
    <div class="filter-bar">
      <input type="text" id="search" placeholder="Search..." oninput="renderProducts()">
      <select id="categoryFilter" onchange="renderProducts()"><option value="">All Categories</option></select>
    </div>

    <h2>Products</h2>
    <div class="products" id="productList"></div>
  </div>
</div>

<script>
/* ===== Admin Login ===== */
function adminLogin(){
  let u = document.getElementById("adminUser").value;
  let p = document.getElementById("adminPass").value;
  if(u==="admin" && p==="admin"){
    document.getElementById("loginPanel").style.display="none";
    document.getElementById("adminDashboard").style.display="block";
  } else { alert("Invalid Credentials"); }
}

/* ===== Products Logic ===== */
let products = JSON.parse(localStorage.getItem("products")) || [];
let editIndex = null;

function save(){localStorage.setItem("products",JSON.stringify(products));}

function addProduct(){
  let name=document.getElementById("pname").value;
  let price=Number(document.getElementById("price").value);
  let discount=Number(document.getElementById("discount").value)||0;
  let stock=document.getElementById("stock").value||0;
  let whatsapp=document.getElementById("whatsapp").value;
  let category=document.getElementById("category").value;
  let files=document.getElementById("images").files;

  if(!name || !price || !whatsapp || files.length==0){alert("Fill all fields"); return;}
  if(files.length>5){alert("Max 5 images allowed"); return;}

  let images=[]; let loaded=0;
  for(let i=0;i<files.length;i++){
    let reader=new FileReader();
    reader.onload=e=>{
      images.push(e.target.result);
      loaded++;
      if(loaded==files.length){
        products.push({name,price,discount,stock,whatsapp,category,images});
        save(); renderProducts(); clearForm();
      }
    }
    reader.readAsDataURL(files[i]);
  }
}

function clearForm(){
  document.getElementById("pname").value="";
  document.getElementById("price").value="";
  document.getElementById("discount").value="";
  document.getElementById("stock").value="";
  document.getElementById("whatsapp").value="";
  document.getElementById("category").value="";
  document.getElementById("images").value="";
  editIndex=null;
  document.getElementById("updateBtn").style.display="none";
  document.querySelector("button[onclick='addProduct()']").style.display="inline-block";
}

/* ===== Render Products ===== */
function renderProducts(){
  let list=document.getElementById("productList");
  list.innerHTML="";
  let search = document.getElementById("search").value.toLowerCase();
  let catFilter = document.getElementById("categoryFilter").value;
  let categories = new Set();

  products.forEach((p,i)=>{
    categories.add(p.category);
    if((p.name.toLowerCase().includes(search) || p.category.toLowerCase().includes(search))
       && (catFilter=="" || p.category==catFilter)){
      let final=(p.price-(p.price*p.discount/100)).toFixed(0);
      let card=document.createElement("div"); card.className="card";
      card.innerHTML=`
        <img src="${p.images[0]}" class="main-img" id="mainImg${i}">
        <h3>${p.name}</h3>
        <div>Category: ${p.category}</div>
        <div class="old">PKR ${p.price}</div>
        <div class="price">PKR ${final}</div>
        <div>Stock: ${p.stock}</div>
        <div class="thumb-slider" id="slider${i}"></div>
        <button onclick="orderProduct(${i})">Order WhatsApp</button>
        <button onclick="editProduct(${i})" class="edit">Edit</button>
        <button onclick="deleteProduct(${i})" class="delete">Delete</button>
      `;
      list.appendChild(card);
      let slider = document.getElementById(`slider${i}`);
      p.images.forEach((img,j)=>{
        let thumb = document.createElement("img");
        thumb.src=img;
        if(j==0) thumb.classList.add("active");
        thumb.onclick = ()=>{
          document.getElementById(`mainImg${i}`).src=img;
          Array.from(slider.children).forEach(x=>x.classList.remove("active"));
          thumb.classList.add("active");
        };
        slider.appendChild(thumb);
      });
    }
  });

  // Populate category filter
  let sel=document.getElementById("categoryFilter");
  let current=sel.value;
  sel.innerHTML='<option value="">All Categories</option>';
  categories.forEach(c=>{
    let opt=document.createElement("option");
    opt.value=c; opt.text=c;
    if(c==current) opt.selected=true;
    sel.appendChild(opt);
  });
}

/* ===== Product Actions ===== */
function orderProduct(i){
  let p=products[i];
  let final=(p.price-(p.price*p.discount/100)).toFixed(0);
  window.open(`https://wa.me/${p.whatsapp}?text=I want to order ${p.name} for PKR ${final}`);
}
function deleteProduct(i){
  if(confirm("Delete product?")){products.splice(i,1); save(); renderProducts();}
}
function editProduct(i){
  let p=products[i];
  document.getElementById("pname").value=p.name;
  document.getElementById("price").value=p.price;
  document.getElementById("discount").value=p.discount;
  document.getElementById("stock").value=p.stock;
  document.getElementById("whatsapp").value=p.whatsapp;
  document.getElementById("category").value=p.category;
  editIndex=i;
  document.getElementById("updateBtn").style.display="inline-block";
  document.querySelector("button[onclick='addProduct()']").style.display="none";
}
function updateProduct(){
  let i=editIndex; if(i===null) return;
  let name=document.getElementById("pname").value;
  let price=Number(document.getElementById("price").value);
  let discount=Number(document.getElementById("discount").value)||0;
  let stock=document.getElementById("stock").value||0;
  let whatsapp=document.getElementById("whatsapp").value;
  let category=document.getElementById("category").value;
  let files=document.getElementById("images").files;
  if(files.length>0){
    let images=[]; let loaded=0;
    for(let j=0;j<files.length;j++){
      let reader=new FileReader();
      reader.onload=e=>{
        images.push(e.target.result);
        loaded++;
        if(loaded==files.length){
          products[i]={name,price,discount,stock,whatsapp,category,images};
          save(); renderProducts(); clearForm();
        }
      }
      reader.readAsDataURL(files[j]);
    }
  } else {
    products[i]={...products[i],name,price,discount,stock,whatsapp,category};
    save(); renderProducts(); clearForm();
  }
}

renderProducts();
</script>
</body>
</html>
